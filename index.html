<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>External Menu</title>

  <!-- lock favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22black%22><path d=%22M17 9h-1V7a4 4 0 10-8 0v2H7a2 2 0 00-2 2v9a2 2 0 002 2h10a2 2 0 002-2v-9a2 2 0 00-2-2zm-6 0V7a2 2 0 114 0v2h-4z%22/></svg>">

  <style>
    :root {
      --bg: #0f1115;
      --card: #151922;
      --border: #232838;
      --text: #e6e8ee;
      --muted: #9aa3b2;
    }

    :root.light {
      --bg: #f6f7fb;
      --card: #ffffff;
      --border: #e5e7ef;
      --text: #111318;
      --muted: #6b7280;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      height: 100%;
      transition: background .25s ease, color .25s ease;
    }

    .topbar {
      position: fixed;
      top: 12px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    .topbar-inner {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      pointer-events: all;
    }

    .secret {
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .theme-toggle {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all .25s ease;
      box-shadow: 0 4px 14px rgba(0,0,0,.18);
    }

    .theme-toggle svg { width:20px;height:20px;fill:var(--text); }
    .sun{display:none}.moon{display:block}
    :root.light .sun{display:block}
    :root.light .moon{display:none}

    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      gap: 12px;
    }

    .card {
      width: 100%;
      max-width: 1200px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .image-frame {
      width: 100%;
      aspect-ratio: 2532 / 1399;
      overflow: hidden;
      border-radius: 12px;
      background: #00000010;
    }

    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .footer {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      max-width: 900px;
    }

    /* login */
    .login-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 20;
    }

    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 14px;
      width: 100%;
      max-width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .login-box h1 {
      font-size: 14px;
      margin: 0 0 12px;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      margin-bottom: 10px;
      outline: none;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
    }

  </style>
</head>
<body>

<div class="login-overlay" id="login">
  <div class="login-box">
    <h1>🔒 External Menu</h1>
    <input type="password" id="password" placeholder="Password" />
    <button id="loginBtn">Unlock</button>
  </div>
</div>

<div class="topbar">
  <div class="topbar-inner">
    <div class="secret">🔒 External Menu</div>
    <button class="theme-toggle" id="themeToggle">
      <svg class="sun" viewBox="0 0 24 24"><path d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12zm0-16v2m0 16v2M4 12H2m20 0h-2M5.6 5.6 4.2 4.2m15.6 15.6-1.4-1.4M18.4 5.6l1.4-1.4M4.2 19.8l1.4-1.4"/></svg>
      <svg class="moon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
    </button>
  </div>
</div>

<div class="wrap" id="content" style="display:none">
  <div class="card">
    <div class="image-frame">
      <img src="./imagem.jpg" alt="External Menu" />
    </div>
  </div>

  <div class="footer">
    This page is confidential. Do not share this link.
  </div>
</div>

<script>
(function(){

const PASSWORD = "300429"; // change
const KEY = "auth_exp";
const FIVE_DAYS = 1000 * 60 * 60 * 24 * 5;

const login = document.getElementById("login");
const content = document.getElementById("content");

function unlock(){
  login.style.display = "none";
  content.style.display = "flex";
}

const saved = localStorage.getItem(KEY);
if(saved && Date.now() < Number(saved)) unlock();

document.getElementById("loginBtn").onclick = () => {
  const v = document.getElementById("password").value;
  if(v === PASSWORD){
    localStorage.setItem(KEY, Date.now() + FIVE_DAYS);
    unlock();
  }
};

document.getElementById("password").addEventListener("keydown", e=>{
  if(e.key === "Enter") document.getElementById("loginBtn").click();
});

})();

(function () {
  const storageKey = "theme";
  const root = document.documentElement;

  const systemPrefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;

  function apply(theme) {
    if (theme === "light") root.classList.add("light");
    else root.classList.remove("light");
  }

  const saved = localStorage.getItem(storageKey);
  if (saved) apply(saved);
  else apply(systemPrefersLight ? "light" : "dark");

  document.getElementById("themeToggle").addEventListener("click", () => {
    const isLight = root.classList.toggle("light");
    localStorage.setItem(storageKey, isLight ? "light" : "dark");
  });
})();
</script>

</body>
</html>
